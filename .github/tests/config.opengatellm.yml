# -------------------------------- dependencies ---------------------------------
dependencies:
  postgres:
    url: postgresql+asyncpg://postgres:changeme@postgres:5432/postgres
    echo: False
    pool_size: 10
    max_overflow: 5
    pool_pre_ping: True
    pool_recycle: 3600 
    pool_reset_on_return: commit
    connect_args:
      server_settings:
        statement_timeout: "120s"
      command_timeout: 60

  redis:
    url: redis://:changeme@redis:6379
    max_connections: 200
    socket_connect_timeout: 5
    retry_on_timeout: True
    health_check_interval: 30
    decode_responses: False
  
  elasticsearch:
    index_name: test_index
    index_language: french
    number_of_shards: 1
    number_of_replicas: 1
    refresh_interval: 1s
    hosts: http://elasticsearch:9200
    basic_auth:
      - elastic
      - changeme

# ---------------------------------- settings -----------------------------------
settings:
  vector_store_model: openweight-embeddings

# ----------------------------------- models ------------------------------------
models:  
  - name: openweight-embeddings
    type: text-embeddings-inference
    cost_prompt_tokens: 10
    cost_completion_tokens: 30
    providers:
      - type: albert
        key: ${ALBERT_ADMIN_API_KEY}
        timeout: 120
        model_name: BAAI/bge-m3
        model_total_params: 8
        model_active_params: 8
        model_hosting_zone: FRA
        max_parallel_requests: 5